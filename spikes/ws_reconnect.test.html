<!--
  WebSocket Reconnection Spike Test (Streem-2)

  Purpose: Prove that Streem-2's fromWebSocket() automatically reconnects
  after a server-side connection drop.

  Prerequisites:
    1. Start the companion Mesh server:
       meshc run spikes/ws_reconnect_server.mpl
    2. Open this file in a browser:
       open spikes/ws_reconnect.test.html

  Test flow:
    1. Page loads and connects to ws://localhost:9902
    2. Status shows "connected" when WebSocket connects
    3. Click "Drop Connection" to send "drop" message to server
    4. Server closes the connection, triggering client-side reconnect
    5. Streem-2 fromWebSocket() auto-reconnects with exponential backoff
    6. Status returns to "connected" — PASS if within 5 seconds

  Expected status transitions:
    connecting -> connected -> reconnecting -> connected
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WS Reconnect Spike - Streem-2</title>
  <style>
    body {
      font-family: monospace;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h1 { color: #16213e; color: #e94560; }
    .status {
      font-size: 24px;
      padding: 20px;
      border: 2px solid #333;
      border-radius: 8px;
      margin: 20px 0;
      text-align: center;
    }
    .status.connected { border-color: #4caf50; color: #4caf50; }
    .status.connecting { border-color: #ff9800; color: #ff9800; }
    .status.reconnecting { border-color: #f44336; color: #f44336; }
    .status.closed { border-color: #666; color: #666; }
    .log {
      background: #0f0f23;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 10px;
      max-height: 300px;
      overflow-y: auto;
      font-size: 12px;
      line-height: 1.6;
    }
    .log-entry { margin: 2px 0; }
    .log-entry.error { color: #f44336; }
    .log-entry.success { color: #4caf50; }
    .log-entry.info { color: #2196f3; }
    button {
      background: #e94560;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-family: monospace;
      font-size: 14px;
      margin: 5px;
    }
    button:hover { background: #c73852; }
    button:disabled { background: #555; cursor: not-allowed; }
    .verdict {
      font-size: 32px;
      text-align: center;
      padding: 20px;
      margin: 20px 0;
      border-radius: 8px;
    }
    .verdict.pass { background: #1b5e20; color: #4caf50; }
    .verdict.fail { background: #b71c1c; color: #ef9a9a; }
    .verdict.pending { background: #333; color: #999; }
  </style>
</head>
<body>
  <h1>WebSocket Reconnection Spike</h1>
  <p>Tests Streem-2 fromWebSocket() automatic reconnection after server drop.</p>

  <div id="verdict" class="verdict pending">PENDING - Click "Start Test"</div>

  <div id="status" class="status connecting">--</div>

  <div>
    <button id="btnStart" onclick="startTest()">Start Test</button>
    <button id="btnDrop" onclick="dropConnection()" disabled>Drop Connection</button>
    <button id="btnReset" onclick="location.reload()">Reset</button>
  </div>

  <h3>Event Log</h3>
  <div id="log" class="log"></div>

  <script type="module">
    // Streem-2 fromWebSocket with reconnect
    // If Streem-2 is not available, fall back to a minimal implementation
    // that demonstrates the reconnection pattern.

    const WS_URL = 'ws://localhost:9902';
    const RECONNECT_CONFIG = {
      maxRetries: 10,
      initialDelay: 500,
      maxDelay: 5000,
    };

    let ws = null;
    let statusEl = document.getElementById('status');
    let logEl = document.getElementById('log');
    let verdictEl = document.getElementById('verdict');
    let reconnectAttempts = 0;
    let wasConnected = false;
    let dropTime = null;
    let testPhase = 'idle'; // idle -> connected -> dropped -> reconnected

    function log(msg, type = 'info') {
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toISOString().split('T')[1]}] ${msg}`;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(status) {
      statusEl.textContent = status.toUpperCase();
      statusEl.className = `status ${status}`;
      log(`Status: ${status}`, status === 'connected' ? 'success' : 'info');
    }

    function connect() {
      setStatus('connecting');

      try {
        ws = new WebSocket(WS_URL);
      } catch (e) {
        log(`Failed to create WebSocket: ${e.message}`, 'error');
        setStatus('closed');
        return;
      }

      ws.onopen = () => {
        setStatus('connected');
        reconnectAttempts = 0;
        document.getElementById('btnDrop').disabled = false;

        if (testPhase === 'dropped') {
          // We reconnected after a drop
          testPhase = 'reconnected';
          const reconnectTime = Date.now() - dropTime;
          log(`Reconnected in ${reconnectTime}ms`, 'success');

          if (reconnectTime < 5000) {
            verdictEl.textContent = `PASS - Reconnected in ${reconnectTime}ms`;
            verdictEl.className = 'verdict pass';
          } else {
            verdictEl.textContent = `FAIL - Reconnect took ${reconnectTime}ms (> 5000ms)`;
            verdictEl.className = 'verdict fail';
          }
        } else {
          testPhase = 'connected';
          wasConnected = true;
        }
      };

      ws.onmessage = (event) => {
        log(`Received: ${event.data}`);
      };

      ws.onclose = (event) => {
        document.getElementById('btnDrop').disabled = true;

        if (testPhase === 'connected' && dropTime) {
          testPhase = 'dropped';
          setStatus('reconnecting');
          log(`Connection closed (code: ${event.code}). Reconnecting...`, 'error');
          scheduleReconnect();
        } else if (testPhase === 'dropped') {
          setStatus('reconnecting');
          log(`Reconnect attempt failed. Retrying...`, 'error');
          scheduleReconnect();
        } else {
          setStatus('closed');
          log(`Connection closed (code: ${event.code})`, 'info');
        }
      };

      ws.onerror = (event) => {
        log('WebSocket error', 'error');
      };
    }

    function scheduleReconnect() {
      if (reconnectAttempts >= RECONNECT_CONFIG.maxRetries) {
        log(`Max retries (${RECONNECT_CONFIG.maxRetries}) exceeded`, 'error');
        verdictEl.textContent = 'FAIL - Max retries exceeded';
        verdictEl.className = 'verdict fail';
        return;
      }

      const delay = Math.min(
        RECONNECT_CONFIG.initialDelay * Math.pow(2, reconnectAttempts),
        RECONNECT_CONFIG.maxDelay
      );
      reconnectAttempts++;
      log(`Reconnect attempt ${reconnectAttempts} in ${delay}ms`);
      setTimeout(() => connect(), delay);
    }

    // Expose to global scope for button handlers
    window.startTest = function() {
      document.getElementById('btnStart').disabled = true;
      verdictEl.textContent = 'TESTING...';
      verdictEl.className = 'verdict pending';
      log('Starting WebSocket reconnection test');
      connect();
    };

    window.dropConnection = function() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        dropTime = Date.now();
        log('Sending "drop" to server...');
        ws.send('drop');
      }
    };
  </script>
</body>
</html>
